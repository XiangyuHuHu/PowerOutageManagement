<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能停送电系统登录</title>
  <script src="https://unpkg.com/vue@3"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      color: #fff;
    }
    .login-box {
      width: 420px;
      max-width: calc(100vw - 32px);
      background: rgba(16, 33, 47, 0.92);
      border-radius: 18px;
      padding: 36px;
      border: 1px solid rgba(64, 158, 255, 0.28);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
    }
    h1 {
      margin: 0 0 24px;
      text-align: center;
      font-size: 24px;
      color: #dff3ff;
    }
    input, button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      box-sizing: border-box;
      font-size: 15px;
    }
    input {
      margin-bottom: 16px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }
    button {
      cursor: pointer;
      color: #fff;
      font-weight: 700;
      background: linear-gradient(135deg, #409eff, #2a6bc5);
      margin-bottom: 12px;
    }
    .sub-btn {
      background: linear-gradient(135deg, #67c23a, #4a8c2c);
    }
    .error { min-height: 22px; text-align: center; color: #ff9f9f; }
  </style>
</head>
<body>
  <div id="app">
    <div class="login-box">
      <h1>智能停送电系统登录</h1>
      <input v-model="form.username" placeholder="用户名">
      <input v-model="form.password" type="password" placeholder="密码">
      <button @click="login">登录</button>
      <button class="sub-btn" @click="goToRegister">注册新用户</button>
      <div class="error">{{ error }}</div>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue;
    axios.defaults.withCredentials = true;

    createApp({
      setup() {
        const form = ref({ username: '', password: '' });
        const error = ref('');

        const persistUser = (data) => {
          localStorage.setItem('user_id', data.id);
          localStorage.setItem('user_username', data.username);
          localStorage.setItem('user_realname', data.realname || '');
          localStorage.setItem('user_role', data.role);
          localStorage.setItem('user_function_permissions', JSON.stringify(data.function_permissions || []));
          localStorage.setItem('user_room_scopes', JSON.stringify(data.room_scopes || []));
          localStorage.setItem('user_access_all_rooms', String(data.access_all_rooms !== false));
        };

        const login = async () => {
          error.value = '';
          if (!form.value.username || !form.value.password) {
            error.value = '请输入用户名和密码';
            return;
          }
          try {
            const res = await axios.post('/api/login', form.value);
            persistUser(res.data);
            const role = res.data.role;
            if (role === 'dispatcher') {
              window.location.href = 'dispatcher_home.html';
            } else if (role === 'electrician') {
              window.location.href = 'electrician_home.html';
            } else if (role === 'admin') {
              window.location.href = 'admin.html';
            } else {
              window.location.href = 'apply.html';
            }
          } catch (err) {
            error.value = err?.response?.data?.msg || '登录失败';
          }
        };

        const goToRegister = () => {
          window.location.href = 'register.html';
        };

        return { form, error, login, goToRegister };
      },
    }).mount('#app');
  </script>
</body>
</html>
