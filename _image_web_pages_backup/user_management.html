<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户与权限管理</title>
  <script src="https://unpkg.com/vue@3"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
  <script src="https://cdn.jsdelivr.net/npm/element-plus"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0d1c28, #1e3950 55%, #295f75);
      color: #eef9ff;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      padding: 22px;
    }
    #app {
      max-width: 1480px;
      margin: 0 auto;
      background: rgba(10, 25, 37, 0.9);
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(114, 197, 255, 0.16);
      box-shadow: 0 24px 50px rgba(0,0,0,0.36);
    }
    .header, .content { padding: 24px 28px; }
    .header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-start;
      background: linear-gradient(90deg, rgba(9, 31, 45, 0.96), rgba(30, 82, 103, 0.84));
      border-bottom: 1px solid rgba(114, 197, 255, 0.12);
    }
    .header h1 { margin: 0; font-size: 30px; }
    .header p { margin: 8px 0 0; color: #abdfff; line-height: 1.8; font-size: 14px; max-width: 820px; }
    .stats { display: grid; grid-template-columns: repeat(4, minmax(180px,1fr)); gap: 14px; margin-bottom: 16px; }
    .stat { padding: 16px; border-radius: 18px; background: rgba(255,255,255,0.05); border: 1px solid rgba(114,197,255,0.12); }
    .stat .num { font-size: 30px; font-weight: 800; color: #ffd66f; }
    .stat .label { margin-top: 8px; color: #b9e4ff; font-size: 13px; }
    .el-table { background: rgba(8, 18, 28, 0.78) !important; border-radius: 18px !important; border: 1px solid rgba(114,197,255,0.12) !important; }
    .el-table th { background: rgba(22, 66, 88, 0.92) !important; color: #eef9ff !important; border: none !important; }
    .el-table tr { background: rgba(12, 31, 46, 0.72) !important; }
    .el-table td { color: #edf8ff !important; border-bottom: 1px solid rgba(114,197,255,0.08) !important; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag-item { padding: 4px 10px; border-radius: 999px; background: rgba(255,255,255,0.08); font-size: 12px; }
    .section-label { font-size: 13px; color: #abdfff; margin-bottom: 8px; display: block; }
    @media (max-width: 980px) { .stats { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 680px) { .stats { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <div>
        <h1>用户与权限管理</h1>
        <p>管理员现在可以直接配置功能权限和配电室范围。电工和调度员如果不限定配电室，则默认保留全部配电室访问；一旦配置了范围，列表、审批和详情都会按配电室收口。</p>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <el-button @click="fetchUsers">刷新</el-button>
        <el-button type="primary" @click="goBack">返回</el-button>
      </div>
    </div>

    <div class="content">
      <div class="stats">
        <div class="stat"><div class="num">{{ stats.total }}</div><div class="label">总用户数</div></div>
        <div class="stat"><div class="num">{{ stats.dispatcher }}</div><div class="label">调度员</div></div>
        <div class="stat"><div class="num">{{ stats.electrician }}</div><div class="label">电工</div></div>
        <div class="stat"><div class="num">{{ stats.scoped }}</div><div class="label">已限定配电室</div></div>
      </div>

      <el-table :data="users" border v-loading="loading" height="620">
        <el-table-column prop="username" label="账号" width="150" />
        <el-table-column prop="realname" label="姓名" width="120" />
        <el-table-column prop="role" label="角色" width="120" />
        <el-table-column label="配电室范围" min-width="220">
          <template #default="{ row }">
            <div class="tag-list" v-if="row.room_scopes && row.room_scopes.length">
              <span class="tag-item" v-for="room in row.room_scopes" :key="room">{{ room }}</span>
            </div>
            <span v-else>全部配电室</span>
          </template>
        </el-table-column>
        <el-table-column label="功能权限" min-width="280">
          <template #default="{ row }">
            <div class="tag-list">
              <span class="tag-item" v-for="permission in row.function_permissions" :key="permission">{{ permissionLabels[permission] || permission }}</span>
            </div>
          </template>
        </el-table-column>
        <el-table-column label="操作" width="220" fixed="right">
          <template #default="{ row }">
            <div style="display:flex; gap:8px;">
              <el-button type="primary" size="small" @click="openEdit(row)">编辑权限</el-button>
              <el-button type="danger" size="small" v-if="row.role !== 'admin'" @click="removeUser(row.id)">删除</el-button>
            </div>
          </template>
        </el-table-column>
      </el-table>
    </div>

    <el-dialog v-model="dialogVisible" title="编辑用户权限" width="720px" :close-on-click-modal="false">
      <el-form label-width="110px">
        <el-form-item label="账号">
          <el-input :model-value="editForm.username" disabled />
        </el-form-item>
        <el-form-item label="姓名">
          <el-input v-model="editForm.realname" />
        </el-form-item>
        <el-form-item label="角色">
          <el-select v-model="editForm.role" style="width: 100%;">
            <el-option label="管理员" value="admin" />
            <el-option label="调度员" value="dispatcher" />
            <el-option label="电工" value="electrician" />
            <el-option label="普通用户" value="user" />
          </el-select>
        </el-form-item>
        <el-form-item label="新密码">
          <el-input v-model="editForm.password" type="password" show-password placeholder="留空则不修改" />
        </el-form-item>
        <el-form-item label="配电室范围" v-if="editForm.role !== 'admin'">
          <el-select v-model="editForm.room_scopes" multiple collapse-tags style="width: 100%;" placeholder="留空表示全部配电室">
            <el-option v-for="room in permissionOptions.rooms" :key="room" :label="room" :value="room" />
          </el-select>
        </el-form-item>
        <el-form-item label="功能权限" v-if="editForm.role !== 'admin'">
          <el-checkbox-group v-model="editForm.function_permissions">
            <el-checkbox v-for="item in permissionOptions.function_permissions" :key="item.code" :label="item.code">
              {{ item.label }}
            </el-checkbox>
          </el-checkbox-group>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="dialogVisible = false">取消</el-button>
        <el-button type="primary" @click="saveUser">保存</el-button>
      </template>
    </el-dialog>
  </div>

  <script>
    if (!localStorage.getItem('user_realname') && !localStorage.getItem('user_username')) {
      window.location.href = '/login.html';
    }
    if (localStorage.getItem('user_role') !== 'admin') {
      window.location.href = '/login.html';
    }
    axios.defaults.withCredentials = true;
    const { createApp, ref, computed, onMounted } = Vue;
    createApp({
      setup() {
        const { ElMessage, ElMessageBox } = ElementPlus;
        const loading = ref(false);
        const users = ref([]);
        const dialogVisible = ref(false);
        const permissionOptions = ref({ rooms: [], function_permissions: [] });
        const permissionLabels = {
          approval_center: '审批中心',
          batch_approval: '批量审批',
          batch_management: '大检修批次',
          device_monitor: '设备监控',
          notifications: '通知',
          stats: '统计',
          user_management: '用户管理',
          apply: '停电申请',
          repair: '检修处理',
          power_on_apply: '送电申请',
        };
        const editForm = ref({
          id: null,
          username: '',
          realname: '',
          role: '',
          password: '',
          room_scopes: [],
          function_permissions: [],
        });

        const stats = computed(() => ({
          total: users.value.length,
          dispatcher: users.value.filter((item) => item.role === 'dispatcher').length,
          electrician: users.value.filter((item) => item.role === 'electrician').length,
          scoped: users.value.filter((item) => item.room_scopes && item.room_scopes.length > 0).length,
        }));

        const fetchUsers = async () => {
          loading.value = true;
          try {
            const [usersRes, optionsRes] = await Promise.all([
              axios.get('/api/users'),
              axios.get('/api/permission-options'),
            ]);
            users.value = Array.isArray(usersRes.data) ? usersRes.data : [];
            permissionOptions.value = optionsRes.data || { rooms: [], function_permissions: [] };
          } catch (error) {
            ElMessage.error(error?.response?.data?.msg || '用户列表加载失败');
          } finally {
            loading.value = false;
          }
        };

        const openEdit = (user) => {
          editForm.value = {
            id: user.id,
            username: user.username,
            realname: user.realname,
            role: user.role,
            password: '',
            room_scopes: [...(user.room_scopes || [])],
            function_permissions: [...(user.function_permissions || [])],
          };
          dialogVisible.value = true;
        };

        const saveUser = async () => {
          if (!editForm.value.realname.trim()) {
            ElMessage.warning('请填写姓名');
            return;
          }
          try {
            await axios.put(`/api/users/${editForm.value.id}`, editForm.value);
            ElMessage.success('用户权限已更新');
            dialogVisible.value = false;
            await fetchUsers();
          } catch (error) {
            ElMessage.error(error?.response?.data?.msg || '更新失败');
          }
        };

        const removeUser = async (id) => {
          try {
            await ElMessageBox.confirm('确认删除该用户？', '删除用户', { type: 'warning' });
            await axios.delete(`/api/users/${id}`);
            ElMessage.success('删除成功');
            await fetchUsers();
          } catch (error) {
            if (error !== 'cancel') {
              ElMessage.error(error?.response?.data?.msg || '删除失败');
            }
          }
        };

        const goBack = () => window.history.back();

        onMounted(fetchUsers);
        return { loading, users, stats, dialogVisible, editForm, permissionOptions, permissionLabels, fetchUsers, openEdit, saveUser, removeUser, goBack };
      },
    }).use(ElementPlus).mount('#app');
  </script>
</body>
</html>
