<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>审批历史记录</title>
  <script src="https://unpkg.com/vue@3"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
  <script src="https://cdn.jsdelivr.net/npm/element-plus"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: #203a43; color: #fff; min-height: 100vh; margin: 0; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; }
    #app { max-width: 1400px; margin: 40px auto; background: rgba(16,33,47,0.95); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); border: 1px solid rgba(64,158,255,0.2); padding: 32px; }
    h2 { text-align: center; margin-bottom: 32px; }
    .el-table { background: rgba(12,28,44,0.7) !important; border-radius: 12px !important; overflow: hidden; border: 1px solid rgba(64,158,255,0.2) !important; }
    .el-table th { background: linear-gradient(to bottom, #0d2b46, #143a5f) !important; color: #e6f7ff !important; font-weight: 600 !important; border: none !important; }
    .el-table tr { background: rgba(16,33,47,0.5) !important; transition: all 0.3s ease; }
    .el-table tr:hover { background: rgba(30,60,90,0.7) !important; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    .el-table td { border-bottom: 1px solid rgba(64,158,255,0.1) !important; color: #e6f7ff !important; }
    .el-tag { font-weight: 600 !important; border: none !important; }
    .status-completed .el-tag { background: linear-gradient(135deg, #67c23a, #4a8c2c) !important; color: #fff !important; }
    .status-rejected .el-tag, .status-power_on_rejected .el-tag { background: linear-gradient(135deg, #f56c6c, #c45656) !important; color: #fff !important; }
    .status-approved .el-tag { background: linear-gradient(135deg, #409eff, #2a6bc5) !important; color: #fff !important; }
    .status-pending .el-tag { background: linear-gradient(135deg, #e6a23c, #b88230) !important; color: #fff !important; }
    .status-power_on_applied .el-tag { background: linear-gradient(135deg, #e6a23c, #b88230) !important; color: #fff !important; }
  </style>
</head>
<body>
  <div id="app">
    <button style="position: absolute; top: 24px; right: 36px; z-index: 1000; background: linear-gradient(135deg, #409eff, #2a6bc5); color: #fff; border: none; border-radius: 8px; padding: 8px 20px; font-weight: bold; font-size: 15px; cursor: pointer;" @click="logout">
      <i class='fas fa-sign-out-alt'></i> 退出登录
    </button>
    <button style="position: absolute; top: 24px; right: 140px; z-index: 1000; background: linear-gradient(135deg, #909399, #606266); color: #fff; border: none; border-radius: 8px; padding: 8px 20px; font-weight: bold; font-size: 15px; cursor: pointer;" @click="goBack">
      <i class='fas fa-arrow-left'></i> 返回首页
    </button>
    <h2><i class="fas fa-history"></i> 审批历史记录</h2>
    <div style="overflow-x: auto;">
      <el-table
        :data="historyList"
        style="width: 100%;"
        border
        height="600"
        v-loading="loading"
        element-loading-text="加载中..."
      >
        <el-table-column prop="id" label="ID" min-width="80" align="center">
          <template #default="{ row }">
            <div style="font-weight: bold;">#{{ row.id }}</div>
          </template>
        </el-table-column>
        <el-table-column prop="applicant" label="申请人" min-width="120" align="center">
          <template #default="{ row }">
            <i class="fas fa-user-circle"></i>
            {{ row.applicant }}
          </template>
        </el-table-column>
        <el-table-column prop="created_at" label="时间" min-width="180" align="center">
          <template #default="{ row }">
            <i class="fas fa-clock"></i>
            {{ formatDateTime(row.created_at) }}
          </template>
        </el-table-column>
        <el-table-column prop="deviceId" label="设备编号" min-width="120" align="center">
          <template #default="{ row }">
            <i class="fas fa-microchip"></i>
            {{ row.deviceId }}
          </template>
        </el-table-column>
        <el-table-column prop="reason" label="停电原因" min-width="160" align="center">
          <template #default="{ row }">
            <i class="fas fa-comment-alt"></i>
            {{ row.reason }}
          </template>
        </el-table-column>
        <el-table-column prop="status" label="当前状态" min-width="120" align="center">
          <template #default="{ row }">
            <div :class="'status-' + row.status">
              <el-tag>{{ statusText(row.status) }}</el-tag>
            </div>
          </template>
        </el-table-column>
        <el-table-column prop="status" label="审批类型" min-width="120" align="center">
          <template #default="{ row }">
            <el-tag v-if="row.status === 'pending'" type="warning">停电审批</el-tag>
            <el-tag v-else-if="['approved', 'verified', 'repairing', 'repair_completed'].includes(row.status)" type="info">停电中</el-tag>
            <el-tag v-else-if="row.status === 'power_on_applied'" type="success">送电审批</el-tag>
            <el-tag v-else-if="row.status === 'completed'" type="success">完成</el-tag>
            <el-tag v-else-if="['rejected', 'power_on_rejected'].includes(row.status)" type="danger">已驳回</el-tag>
            <span v-else>-</span>
          </template>
        </el-table-column>
        <el-table-column label="操作" min-width="120" align="center">
          <template #default="{ row }">
            <el-button type="primary" size="small" @click="viewDetail(row.id)">
              <i class="fas fa-eye"></i> 详情
            </el-button>
          </template>
        </el-table-column>
      </el-table>
    </div>
  </div>
  <script>
    axios.defaults.withCredentials = true;
    
    // 添加响应拦截器处理401错误
    axios.interceptors.response.use(
      response => response,
      error => {
        if (error.response && error.response.status === 401) {
          // 清除本地存储并跳转到登录页
          localStorage.clear();
          window.location.href = '/login.html';
        }
        return Promise.reject(error);
      }
    );
    const { createApp, ref, onMounted } = Vue;
    createApp({
      setup() {
        const historyList = ref([]);
        const loading = ref(false);
        const statusMap = {
          pending: "待审批",
          approved: "审批通过",
          rejected: "审批驳回",
          verified: "已验电",
          "verify-rejected": "验电驳回",
          repairing: "检修中",
          "repair_completed": "检修完成",
          "power_on_applied": "送电申请",
          completed: "已完成",
          "power_on_rejected": "送电驳回"
        };
        const statusText = (status) => statusMap[status] || status;
        const formatDateTime = (timestamp) => {
          if (!timestamp) return '';
          const date = new Date(timestamp);
          return date.toLocaleString('zh-CN', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
          });
        };
        const fetchHistory = async () => {
          loading.value = true;
          try {
            const res = await axios.get('/api/list');
            // 只排除"pending"和"power_on_applied"，其他都算历史
            historyList.value = res.data.filter(app => !['pending', 'power_on_applied'].includes(app.status));
          } catch (err) {
            historyList.value = [];
          } finally {
            loading.value = false;
          }
        };
        const viewDetail = (id) => {
          window.open(`/detail.html?id=${id}`, '_blank');
        };
        const goBack = () => {
          window.location.href = '/dispatcher_home.html';
        };
        const logout = () => {
          localStorage.clear();
          window.location.href = '/login.html';
        };
        onMounted(() => {
          fetchHistory();
        });
        return { historyList, loading, statusText, formatDateTime, viewDetail, goBack, logout };
      }
    }).use(ElementPlus).mount('#app')
  </script>
</body>
</html>
