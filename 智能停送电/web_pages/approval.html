<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能停送电 - 调度审批后台</title>
  <script src="https://unpkg.com/vue@3"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
  <script src="https://cdn.jsdelivr.net/npm/element-plus"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    #app {
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(16, 33, 47, 0.8);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(64, 158, 255, 0.2);
    }
    .app-header {
      background: linear-gradient(to right, #0c1d2c, #1a3a5f);
      padding: 25px 40px;
      display: flex;
      align-items: center;
      border-bottom: 2px solid #409eff;
      position: relative;
      overflow: hidden;
    }
    .app-header::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(64, 158, 255, 0.1) 0%, transparent 70%);
      z-index: 0;
    }
    .header-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      width: 100%;
      justify-content: space-between;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .logo-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #409eff, #1e3a8a);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(64, 158, 255, 0.5);
    }
    .logo-icon i {
      font-size: 28px;
      color: #fff;
    }
    .header-text h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 8px;
      background: linear-gradient(to right, #409eff, #a0d9ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .header-text p {
      font-size: 16px;
      color: #a0d9ff;
    }
    .stats-container {
      display: flex;
      gap: 30px;
      background: rgba(0, 30, 60, 0.5);
      padding: 15px 25px;
      border-radius: 12px;
      border: 1px solid rgba(64, 158, 255, 0.3);
    }
    
    .notification-badge {
      position: relative;
      cursor: pointer;
    }
    
    .notification-icon {
      font-size: 24px;
      color: #a0d9ff;
      transition: color 0.3s;
    }
    
    .notification-icon:hover {
      color: #409eff;
    }
    
    .notification-count {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #f56c6c;
      color: white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    
    .notification-panel {
      position: absolute;
      top: 100%;
      right: 0;
      width: 400px;
      max-height: 500px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      z-index: 1000;
      overflow: hidden;
      display: none;
    }
    
    .notification-panel.show {
      display: block;
    }
    
    .notification-header {
      background: #409eff;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .notification-list {
      max-height: 400px;
      overflow-y: auto;
    }
    
    .notification-item {
      padding: 15px 20px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    .notification-item:hover {
      background: #f8f9fa;
    }
    
    .notification-item.unread {
      background: #f0f9ff;
      border-left: 3px solid #409eff;
    }
    
    .notification-title {
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
    }
    
    .notification-content {
      font-size: 14px;
      color: #666;
      margin-bottom: 5px;
    }
    
    .notification-time {
      font-size: 12px;
      color: #999;
    }
    .stat-item {
      text-align: center;
      min-width: 100px;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #409eff;
    }
    .stat-label {
      font-size: 14px;
      color: #a0d9ff;
      margin-top: 5px;
    }
    .app-container {
      padding: 30px 40px;
    }
    .approval-user {
      margin-left: 40px;
      font-size: 17px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #a0d9ff;
    }
    .logout-btn {
      background: linear-gradient(135deg, #409eff, #2a6bc5);
      border: none;
      color: #fff;
      padding: 6px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
      margin-left: 32px;
      margin-right: 8px;
      transition: background 0.2s;
    }
    .logout-btn:hover {
      background: linear-gradient(135deg, #2a6bc5, #409eff);
    }
    .el-table {
      background: rgba(12, 28, 44, 0.7) !important;
      border-radius: 12px !important;
      overflow: hidden;
      border: 1px solid rgba(64, 158, 255, 0.2) !important;
    }
    .el-table th {
      background: linear-gradient(to bottom, #0d2b46, #143a5f) !important;
      color: #e6f7ff !important;
      font-weight: 600 !important;
      border: none !important;
    }
    .el-table tr {
      background: rgba(16, 33, 47, 0.5) !important;
      transition: all 0.3s ease;
    }
    .el-table tr:hover {
      background: rgba(30, 60, 90, 0.7) !important;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
    .el-table td {
      border-bottom: 1px solid rgba(64, 158, 255, 0.1) !important;
      color: #e6f7ff !important;
    }
    .el-tag {
      font-weight: 600 !important;
      border: none !important;
    }
    .status-pending .el-tag {
      background: linear-gradient(135deg, #e6a23c, #b88230) !important;
      color: #fff !important;
    }
    .status-approved .el-tag {
      background: linear-gradient(135deg, #67c23a, #4a8c2c) !important;
      color: #fff !important;
    }
    .status-rejected .el-tag {
      background: linear-gradient(135deg, #f56c6c, #c45656) !important;
      color: #fff !important;
    }
    .status-verified .el-tag {
      background: linear-gradient(135deg, #409eff, #2a6bc5) !important;
      color: #fff !important;
    }
    .status-power_on_applied .el-tag {
      background: linear-gradient(135deg, #e6a23c, #b88230) !important;
      color: #fff !important;
    }
    .el-button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .el-button {
      border: none !important;
      font-weight: 600 !important;
      transition: all 0.3s ease !important;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1) !important;
    }
    .el-button--success {
      background: linear-gradient(135deg, #67c23a, #4a8c2c) !important;
    }
    .el-button--danger {
      background: linear-gradient(135deg, #f56c6c, #c45656) !important;
    }
    .el-button--success:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 12px rgba(103, 194, 58, 0.3) !important;
    }
    .el-button--danger:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 12px rgba(245, 108, 108, 0.3) !important;
    }
    .notification {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 25px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10000;
      opacity: 0;
      animation: fadeIn 0.3s forwards;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }
    @keyframes fadeIn {
      to { opacity: 1; top: 30px; }
    }
    .notification-success {
      background: linear-gradient(135deg, #67c23a, #4a8c2c);
      color: white;
    }
    .notification-error {
      background: linear-gradient(135deg, #f56c6c, #c45656);
      color: white;
    }
    .notification-warning {
      background: linear-gradient(135deg, #e6a23c, #b88230);
      color: white;
    }
    .notification-loading {
      background: linear-gradient(135deg, #409eff, #2a6bc5);
      color: white;
    }
    .notification-icon {
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-header">
      <div class="header-content">
        <div class="logo-container">
          <div class="logo-icon">
            <i class="fas fa-bolt"></i>
          </div>
          <div class="header-text">
            <h1>智能停送电调度系统</h1>
            <p>安全 · 高效 · 智能化的电力调度管理平台</p>
          </div>
        </div>
        <div class="stats-container">
          <div class="stat-item">
            <div class="stat-value">{{ stats.total }}</div>
            <div class="stat-label">今日申请</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">{{ stats.pending }}</div>
            <div class="stat-label">待审批</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">{{ stats.completed }}</div>
            <div class="stat-label">已完成</div>
          </div>
        </div>
        <div class="approval-user">
          <div class="notification-badge" @click="toggleNotifications">
            <i class="fas fa-bell notification-icon"></i>
            <span v-if="unreadNotifications > 0" class="notification-count">{{ unreadNotifications }}</span>
          </div>
          <i class="fas fa-user-check"></i>
          审批人：{{ realname || username }}
          <button class="logout-btn" @click="logout">退出登录</button>
          
          <!-- 通知面板 -->
          <div class="notification-panel" :class="{ show: showNotifications }">
            <div class="notification-header">
              <span>系统通知</span>
              <button @click="toggleNotifications" style="background: none; border: none; color: white; cursor: pointer;">
                <i class="fas fa-times"></i>
              </button>
            </div>
            <div class="notification-list">
              <div v-if="notifications.length === 0" style="padding: 20px; text-align: center; color: #999;">
                暂无通知
              </div>
              <div v-else>
                <div v-for="notification in notifications" :key="notification.id" 
                     class="notification-item" :class="{ unread: !notification.is_read }"
                     @click="viewNotification(notification)">
                  <div class="notification-title">{{ notification.title }}</div>
                  <div class="notification-content">{{ notification.content }}</div>
                  <div class="notification-time">{{ formatNotificationTime(notification.created_at) }}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="app-container">
      <div style="overflow-x: auto;">
        <el-table
          :data="applications"
          style="width: 100%; min-width: 1200px;"
          border
          height="500"
          v-loading="loading"
          element-loading-text="加载中..."
        >
          <el-table-column prop="id" label="ID" width="80">
            <template #default="{ row }">
              <div style="font-weight: bold;">#{{ row.id }}</div>
            </template>
          </el-table-column>
          <el-table-column prop="applicant" label="申请人" width="120">
            <template #default="{ row }">
              <i class="fas fa-user-circle"></i>
              {{ row.applicant }}
            </template>
          </el-table-column>
          <el-table-column prop="created_at" label="时间" width="180">
            <template #default="{ row }">
              <i class="fas fa-clock"></i>
              {{ formatDateTime(row.created_at) }}
            </template>
          </el-table-column>
          <el-table-column prop="deviceId" label="设备编号" width="120">
            <template #default="{ row }">
              <i class="fas fa-microchip"></i>
              {{ row.deviceId }}
            </template>
          </el-table-column>
          <el-table-column prop="reason" label="停电原因" width="160">
            <template #default="{ row }">
              <i class="fas fa-comment-alt"></i>
              {{ row.reason }}
            </template>
          </el-table-column>
          <el-table-column prop="status" label="当前状态" width="120">
            <template #default="{ row }">
              <div :class="'status-' + row.status">
                <el-tag>{{ statusText(row.status) }}</el-tag>
              </div>
            </template>
          </el-table-column>
          <el-table-column prop="step" label="审批类型" width="120">
            <template #default="{ row }">
              <el-tag v-if="row.status === 'pending'" type="warning">停电审批</el-tag>
              <el-tag v-else-if="['approved', 'verified', 'repairing', 'repair_completed'].includes(row.status)" type="info">停电中</el-tag>
              <el-tag v-else-if="row.status === 'power_on_applied'" type="success">送电审批</el-tag>
              <el-tag v-else-if="row.status === 'completed'" type="success">完成</el-tag>
              <el-tag v-else-if="['rejected', 'power_on_rejected'].includes(row.status)" type="danger">已驳回</el-tag>
              <span v-else>-</span>
            </template>
          </el-table-column>
          <el-table-column label="调度审批操作" width="260" fixed="right">
            <template #default="{ row }">
              <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <template v-if="row.status === 'pending'">
                  <el-button type="success" size="small" @click="approve(row.id, 'approved')">
                    <i class="fas fa-check"></i> 通过
                  </el-button>
                  <el-button type="danger" size="small" @click="approve(row.id, 'rejected')">
                    <i class="fas fa-times"></i> 驳回
                  </el-button>
                </template>
                <template v-else-if="row.status === 'power_on_applied'">
                  <el-button type="success" size="small" @click="approve(row.id, 'completed')">
                    <i class="fas fa-plug"></i> 允许送电
                  </el-button>
                  <el-button type="danger" size="small" @click="approve(row.id, 'power_on_rejected')">
                    <i class="fas fa-ban"></i> 驳回送电
                  </el-button>
                </template>
                <el-button type="primary" size="small" @click="viewDetail(row.id)">
                  <i class="fas fa-eye"></i> 详情
                </el-button>
              </div>
            </template>
          </el-table-column>
        </el-table>
      </div>
    </div>
    <!-- 可选 footer ... -->
  </div>
  <script>
    // 检查登录状态
    if (!localStorage.getItem('user_realname') && !localStorage.getItem('user_username')) {
      window.location.href = '/login.html';
    }
    axios.defaults.withCredentials = true;
    const { createApp, ref, onMounted } = Vue;
    createApp({
      setup() {
        const applications = ref([]);
        const loading = ref(false);
        const currentTime = ref('');
        const stats = ref({
          total: 0,
          pending: 0,
          completed: 0
        });
        const notifications = ref([]);
        const showNotifications = ref(false);
        const unreadNotifications = ref(0);

        // 当前审批人
        const realname = localStorage.getItem('user_realname') || '';
        const username = localStorage.getItem('user_username') || '';

        const logout = () => {
          localStorage.clear();
          window.location.href = '/login.html';
        };

        const statusMap = {
          pending: "待审批",
          approved: "审批通过",
          rejected: "审批驳回",
          verified: "已验电",
          "verify-rejected": "验电驳回",
          repairing: "检修中",
          "repair_completed": "检修完成",
          "power_on_applied": "送电申请",
          completed: "已完成",
          "power_on_rejected": "送电驳回"
        };

        const statusText = (status) => statusMap[status] || status;

        const formatDateTime = (timestamp) => {
          if (!timestamp) return '';
          const date = new Date(timestamp);
          return date.toLocaleString('zh-CN', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
          });
        };

        const showNotification = (message, type) => {
          const existingNote = document.querySelector('.notification');
          if (existingNote) existingNote.remove();

          const notification = document.createElement('div');
          notification.className = `notification notification-${type}`;
          notification.innerHTML = `
            <i class="notification-icon ${getIcon(type)}"></i>
            <span>${message}</span>
          `;

          document.body.appendChild(notification);

          if (type !== 'loading') {
            setTimeout(() => {
              notification.style.opacity = '0';
              setTimeout(() => {
                if (notification.parentNode) {
                  notification.parentNode.removeChild(notification);
                }
              }, 300);
            }, 3000);
          }
        };

        const getIcon = (type) => {
          switch(type) {
            case 'success': return 'fas fa-check-circle';
            case 'error': return 'fas fa-exclamation-circle';
            case 'warning': return 'fas fa-exclamation-triangle';
            case 'loading': return 'fas fa-spinner fa-spin';
            default: return 'fas fa-info-circle';
          }
        };

        const fetchData = async () => {
          loading.value = true;
          try {
            const res = await axios.get('/api/list');
            // 不做筛选，直接显示所有申请
            applications.value = res.data;
            updateStats();
          } catch (err) {
            showNotification('获取数据失败: ' + (err?.message || err), 'error');
            console.error("发生错误：", err);
          } finally {
            loading.value = false;
          }
        };

        const updateStats = () => {
          stats.value.total = applications.value.length;
          stats.value.pending = applications.value.filter(app =>
            ['pending', 'approved', 'verified', 'repairing', 'repair_completed', 'power_on_applied'].includes(app.status)
          ).length;
          stats.value.completed = applications.value.filter(app =>
            app.status === 'completed'
          ).length;
        };

        // 审批操作，带审批人
        const approve = async (id, newStatus) => {
          loading.value = true;
          try {
            // 先查找当前申请的状态
            const row = applications.value.find(app => app.id === id);
            let url = '';
            let action = '';
            let comment = '';
            if (row.status === 'pending') {
              url = '/api/power-off-approve';
              action = newStatus === 'approved' ? 'approve' : 'reject';
              comment = prompt('请输入停电审批意见（可选）：', '');
            } else if (row.status === 'power_on_applied') {
              url = '/api/power-on-approve';
              action = newStatus === 'completed' ? 'approve' : 'reject';
              comment = prompt('请输入送电审批意见（可选）：', '');
            } else {
              showNotification('当前状态不支持此操作', 'warning');
              loading.value = false;
              return;
            }
            await axios.post(url, {
              id,
              action,
              comment,
            });
            await fetchData();
            showNotification('操作成功！状态已更新', 'success');
          } catch (err) {
            let errMsg = err?.response?.data?.msg || err?.message || err;
            showNotification('操作失败: ' + errMsg, 'error');
            console.error('发生错误：', err);
          } finally {
            loading.value = false;
          }
        };

        // 查看详情
        const viewDetail = (id) => {
          window.open(`/detail.html?id=${id}`, '_blank');
        };
        
        // 通知相关方法
        const fetchNotifications = async () => {
          try {
            const response = await axios.get('/api/notifications');
            notifications.value = response.data;
            unreadNotifications.value = notifications.value.filter(n => !n.is_read).length;
          } catch (err) {
            console.error('获取通知失败:', err);
          }
        };
        
        const toggleNotifications = () => {
          showNotifications.value = !showNotifications.value;
          if (showNotifications.value) {
            fetchNotifications();
          }
        };
        
        const viewNotification = (notification) => {
          // 显示通知详情
          ElMessageBox.alert(
            notification.content,
            notification.title,
            {
              confirmButtonText: '确定'
            }
          );
          
          // 如果未读，标记为已读
          if (!notification.is_read) {
            markAsRead(notification.id);
          }
        };
        
        const markAsRead = async (notificationId) => {
          try {
            await axios.put(`/api/notifications/${notificationId}/read`);
            // 更新本地状态
            const notification = notifications.value.find(n => n.id === notificationId);
            if (notification) {
              notification.is_read = true;
              unreadNotifications.value = notifications.value.filter(n => !n.is_read).length;
            }
          } catch (err) {
            console.error('标记已读失败:', err);
          }
        };
        
        const formatNotificationTime = (timestamp) => {
          if (!timestamp) return '未知时间';
          const date = new Date(timestamp);
          const now = new Date();
          const diff = now - date;
          
          if (diff < 60000) { // 1分钟内
            return '刚刚';
          } else if (diff < 3600000) { // 1小时内
            return `${Math.floor(diff / 60000)}分钟前`;
          } else if (diff < 86400000) { // 1天内
            return `${Math.floor(diff / 3600000)}小时前`;
          } else {
            return date.toLocaleString('zh-CN');
          }
        };

        onMounted(() => {
          fetchData();
          fetchNotifications(); // 获取通知
          // 监听送电申请事件，自动刷新
          window.addEventListener('storage', (e) => {
            if (e.key === 'power_on_apply_refresh') {
              fetchData();
            }
          });
          
          // 定期刷新通知
          setInterval(() => {
            fetchNotifications();
          }, 30000); // 每30秒刷新一次
        });

        return {
          applications,
          stats,
          approve,
