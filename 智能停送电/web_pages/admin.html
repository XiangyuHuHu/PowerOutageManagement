<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员主页 - 智能停送电系统</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      min-height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .admin-container {
      background: rgba(16, 33, 47, 0.95);
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      width: 500px;
      border: 1px solid rgba(64, 158, 255, 0.3);
    }
    
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .header h1 {
      background: linear-gradient(to right, #ff6b6b, #ffa500);
      -webkit-background-clip: text;
      color: transparent;
      font-size: 28px;
      margin-bottom: 10px;
    }
    
    .header p {
      color: #a0d9ff;
      font-size: 16px;
      opacity: 0.8;
    }
    
    .user-info {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .user-info h3 {
      color: #ffa500;
      margin-bottom: 10px;
      font-size: 18px;
    }
    
    .user-details {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .user-detail {
      background: rgba(255, 255, 255, 0.05);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
    }
    
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .admin-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      font-size: 18px;
      font-weight: bold;
      padding: 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #fff;
    }
    
    .btn-approval {
      background: linear-gradient(135deg, #409eff, #2a6bc5);
    }
    
    .btn-approval:hover {
      background: linear-gradient(135deg, #2a6bc5, #409eff);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(64, 158, 255, 0.4);
    }
    
    .btn-stats {
      background: linear-gradient(135deg, #67c23a, #4a8c2c);
    }
    
    .btn-stats:hover {
      background: linear-gradient(135deg, #4a8c2c, #67c23a);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(103, 194, 58, 0.4);
    }
    
    .btn-users {
      background: linear-gradient(135deg, #e6a23c, #b88230);
    }
    
    .btn-users:hover {
      background: linear-gradient(135deg, #b88230, #e6a23c);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(230, 162, 60, 0.4);
    }
    
    .btn-monitor {
      background: linear-gradient(135deg, #9c27b0, #6a1b9a);
    }
    
    .btn-monitor:hover {
      background: linear-gradient(135deg, #6a1b9a, #9c27b0);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(156, 39, 176, 0.4);
    }
    
    .btn-notifications {
      background: linear-gradient(135deg, #ff9800, #f57c00);
    }
    
    .btn-notifications:hover {
      background: linear-gradient(135deg, #f57c00, #ff9800);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255, 152, 0, 0.4);
    }
    
    .btn-logout {
      background: linear-gradient(135deg, #f56c6c, #c45656);
      margin-top: 20px;
    }
    
    .btn-logout:hover {
      background: linear-gradient(135deg, #c45656, #f56c6c);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(245, 108, 108, 0.4);
    }
    
    .logout-section {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="header">
      <h1><i class="fas fa-crown"></i> 管理员控制台</h1>
      <p>智能停送电系统 - 管理员权限</p>
    </div>
    
    <div class="user-info">
      <h3><i class="fas fa-user-shield"></i> 当前用户信息</h3>
      <div class="user-details">
        <div class="user-detail">
          <strong>用户名：</strong><span id="username">管理员</span>
        </div>
        <div class="user-detail">
          <strong>角色：</strong><span id="role">管理员</span>
        </div>
        <div class="user-detail">
          <strong>权限：</strong><span id="permissions">全部权限</span>
        </div>
      </div>
    </div>
    
    <div class="btn-group">
      <button class="admin-btn btn-approval" onclick="goToApproval()">
        <i class="fas fa-clipboard-check"></i>
        审批管理
      </button>
      
      <button class="admin-btn btn-stats" onclick="goToStats()">
        <i class="fas fa-chart-bar"></i>
        系统统计
      </button>
      
      <button class="admin-btn btn-users" onclick="goToUsers()">
        <i class="fas fa-users-cog"></i>
        用户管理
      </button>
      
      <button class="admin-btn btn-monitor" onclick="goToDeviceMonitor()">
        <i class="fas fa-tachometer-alt"></i>
        设备监控
      </button>
      
      <button class="admin-btn btn-notifications" onclick="goToNotifications()">
        <i class="fas fa-bell"></i>
        系统通知
      </button>
    </div>
    
    <div class="logout-section">
      <button class="admin-btn btn-logout" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i>
        退出登录
      </button>
    </div>
  </div>

  <script>
    // 检查登录状态
    if (!localStorage.getItem('user_realname') && !localStorage.getItem('user_username')) {
      window.location.href = '/login.html';
    }
    
    // 显示用户信息
    document.getElementById('username').textContent = localStorage.getItem('user_realname') || localStorage.getItem('user_username') || '管理员';
    document.getElementById('role').textContent = localStorage.getItem('user_role') || '管理员';
    
    function goToApproval() {
      window.location.href = '/approval.html';
    }
    
    function goToStats() {
      // 跳转到统计页面
      window.location.href = '/stats.html';
    }
    
    function goToUsers() {
      // 跳转到用户管理页面
      window.location.href = '/user_management.html';
    }
    
    function goToDeviceMonitor() {
      // 跳转到设备监控页面
      window.location.href = '/device_monitor.html';
    }
    
    function goToNotifications() {
      // 跳转到通知页面
      window.location.href = '/notifications.html';
    }
    
    function logout() {
      localStorage.clear();
      window.location.href = '/login.html';
    }
  </script>
</body>
</html>
