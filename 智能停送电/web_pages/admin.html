<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员控制台</title>
  <link rel="stylesheet" href="/admin_theme.css">
  <script src="/app_shell.js"></script>
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .wrap { width: 1080px; max-width: 100%; border-radius: 24px; padding: 34px; }
    .header { margin-bottom: 26px; }
    .header h1 { margin: 0 0 10px; font-size: 34px; color: #eef9ff; }
    .header p { margin: 0; color: #bfe8ff; line-height: 1.8; }
    .user-box { margin-bottom: 24px; padding: 18px; border-radius: 18px; background: rgba(255,255,255,0.05); border: 1px solid rgba(118,200,255,0.14); }
    .user-box h2 { margin: 0 0 14px; font-size: 22px; }
    .user-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .user-item { padding: 12px 14px; border-radius: 14px; background: rgba(255,255,255,0.05); line-height: 1.7; }
    .nav { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .nav button { width: 100%; border: 1px solid rgba(118,200,255,0.14); border-radius: 18px; padding: 20px 22px; color: #fff; font-size: 18px; font-weight: 800; cursor: pointer; transition: transform 0.18s ease; text-align: left; }
    .nav button:hover { transform: translateY(-2px); }
    .blue { background: linear-gradient(180deg, rgba(77,168,255,0.16), rgba(255,255,255,0.03)); box-shadow: inset 0 4px 0 #4da8ff; }
    .green { background: linear-gradient(180deg, rgba(41,208,196,0.16), rgba(255,255,255,0.03)); box-shadow: inset 0 4px 0 #29d0c4; }
    .gold { background: linear-gradient(180deg, rgba(255,177,77,0.16), rgba(255,255,255,0.03)); box-shadow: inset 0 4px 0 #ffb14d; }
    .purple { background: linear-gradient(180deg, rgba(141,132,255,0.16), rgba(255,255,255,0.03)); box-shadow: inset 0 4px 0 #8d84ff; }
    .orange { background: linear-gradient(180deg, rgba(255,130,87,0.16), rgba(255,255,255,0.03)); box-shadow: inset 0 4px 0 #ff8d5b; }
    .logout { margin-top: 18px; width: 100%; border: none; border-radius: 16px; padding: 16px 18px; background: linear-gradient(135deg, #d25c5c, #f07878); color: #fff; font-size: 18px; font-weight: 800; cursor: pointer; }
    @media (max-width: 720px) { .wrap { padding: 24px; } .user-grid, .nav { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>管理员控制台</h1>
      <p>从这里进入审批管理、审批记录、已完成记录、大检修批次、用户权限、设备监控和系统通知。管理员页面保留全局入口，便于快速切换和演示。</p>
    </div>
    <section class="user-box">
      <h2>当前用户信息</h2>
      <div class="user-grid">
        <div class="user-item"><strong>用户名：</strong><span id="username">管理员</span></div>
        <div class="user-item"><strong>角色：</strong><span id="role">admin</span></div>
        <div class="user-item"><strong>权限：</strong><span id="permissions">全部权限</span></div>
      </div>
    </section>
    <div class="nav">
      <button class="blue" onclick="location.href='approval.html'">审批管理</button>
      <button class="purple" onclick="location.href='approval_history.html'">审批记录</button>
      <button class="green" onclick="location.href='completed_history.html'">已完成记录</button>
      <button class="gold" onclick="location.href='maintenance_batches.html'">大检修批次</button>
      <button class="orange" onclick="location.href='user_management.html'">用户权限</button>
      <button class="blue" onclick="location.href='device_monitor.html'">设备监控</button>
      <button class="purple" onclick="location.href='notifications.html'">系统通知</button>
      <button class="green" onclick="location.href='stats.html'">系统统计</button>
    </div>
    <button class="logout" onclick="logout()">退出登录</button>
  </div>
  <script>
    if (localStorage.getItem('user_role') !== 'admin') {
      window.appShell.handleUnauthorized('只有管理员可以进入管理员控制台。', 400);
    }
    document.getElementById('username').textContent = localStorage.getItem('user_realname') || localStorage.getItem('user_username') || '管理员';
    document.getElementById('role').textContent = localStorage.getItem('user_role') || 'admin';
    document.getElementById('permissions').textContent = '全部权限';
    function logout() { window.appShell.logout(); }
  </script>
</body>
</html>
