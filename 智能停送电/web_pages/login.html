<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能停送电 - 登录</title>
  <script src="https://unpkg.com/vue@3"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      margin: 0;
    }

    .login-box {
      background: rgba(16, 33, 47, 0.9);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      width: 400px;
      color: #fff;
      border: 1px solid rgba(64, 158, 255, 0.3);
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 30px;
      background: linear-gradient(to right, #409eff, #a0d9ff);
      -webkit-background-clip: text;
      color: transparent;
      font-size: 24px;
    }

    .login-box input {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: none;
      background-color: rgba(255, 255, 255, 0.1);
      color: #fff;
      box-sizing: border-box;
    }

    .login-box input::placeholder {
      color: #ccc;
    }

    .login-box button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #409eff, #2a6bc5);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s ease;
      margin-bottom: 15px;
    }

    .login-box button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(64, 158, 255, 0.4);
    }

    .register-btn {
      background: linear-gradient(135deg, #67c23a, #4a8c2c) !important;
    }

    .register-btn:hover {
      background: linear-gradient(135deg, #4a8c2c, #67c23a) !important;
      box-shadow: 0 6px 12px rgba(103, 194, 58, 0.4) !important;
    }

    .error {
      color: #f56c6c;
      margin-top: 10px;
      text-align: center;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      position: relative;
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(255, 255, 255, 0.2);
    }

    .divider span {
      background: rgba(16, 33, 47, 0.9);
      padding: 0 15px;
      color: #a0d9ff;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .login-box {
        width: 90%;
        max-width: 350px;
        padding: 30px 20px;
      }
      
      .login-box h2 {
        font-size: 20px;
      }
      
      input, button {
        font-size: 16px; /* 防止iOS缩放 */
      }
      
      .divider {
        margin: 20px 0;
      }
    }
    
    @media (max-width: 480px) {
      .login-box {
        padding: 25px 15px;
      }
      
      .login-box h2 {
        font-size: 18px;
      }
      
      .register-btn {
        padding: 12px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="login-box">
      <h2><i class="fas fa-bolt"></i> 智能停送电系统登录</h2>
      <input v-model="form.username" placeholder="用户名" />
      <input type="password" v-model="form.password" placeholder="密码" />
      <button @click="login">登录</button>
      
      <div class="divider">
        <span>或</span>
      </div>
      
      <button class="register-btn" @click="goToRegister">
        <i class="fas fa-user-plus"></i> 注册新用户
      </button>
      
      <div class="error">{{ error }}</div>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue;
    axios.defaults.withCredentials = true;
    createApp({
      setup() {
        const form = ref({ username: '', password: '' });
        const error = ref('');

        const login = async () => {
          error.value = '';
          if (!form.value.username || !form.value.password) {
            error.value = "请输入用户名和密码";
            return;
          }

          try {
            const res = await axios.post('/api/login', form.value);
            if (res.status === 200) {
              const { role } = res.data;
              localStorage.setItem('user_id', res.data.id);
              localStorage.setItem('user_username', res.data.username);
              localStorage.setItem('user_realname', res.data.realname);
              localStorage.setItem('user_role', role);
              if (role === 'dispatcher') {
                window.location.href = 'dispatcher_home.html';
              } else if (role === 'electrician') {
                window.location.href = 'electrician_home.html';
              } else if (role === 'admin') {
                window.location.href = 'admin.html';
              } else {
                window.location.href = 'apply.html';
              }
            } else {
              error.value = "登录失败：" + (res.data?.msg || res.message);
            }
          } catch (err) {
            error.value = "登录失败：" + (err.response?.data?.msg || err.message);
          }
        };

        const goToRegister = () => {
          window.location.href = 'register.html';
        };

        return { form, login, error, goToRegister };
      }
    }).mount('#app');
  </script>
</body>
</html>
