<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统统计</title>
  <link rel="stylesheet" href="/admin_theme.css">
  <script src="/app_shell.js"></script>
  <script src="/vendor/vue.global.prod.js"></script>
  <script src="/vendor/axios.min.js"></script>
  <link rel="stylesheet" href="/vendor/element-plus/index.css">
  <script src="/vendor/element-plus/index.full.min.js"></script>
  <style>
    body { margin: 0; min-height: 100vh; padding: 22px; }
    #app { max-width: 1480px; margin: 0 auto; border-radius: 24px; overflow: hidden; }
    .header, .content { padding: 24px 28px; }
    .header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-start;
      background: linear-gradient(90deg, rgba(8, 27, 42, 0.96), rgba(24, 79, 103, 0.84));
      border-bottom: 1px solid rgba(114, 197, 255, 0.14);
    }
    .header h1 { margin: 0; font-size: 30px; }
    .header p { margin: 8px 0 0; line-height: 1.8; font-size: 14px; max-width: 920px; color: #bfe8ff; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }
    .stat-card, .panel {
      padding: 18px;
      border-radius: 18px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before, .panel::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 4px;
      border-radius: 18px 18px 0 0;
      opacity: 0.95;
    }
    .stat-total::before { background: linear-gradient(90deg, #4da8ff, #7fd6ff); }
    .stat-approved::before { background: linear-gradient(90deg, #29d0c4, #7ce9d2); }
    .stat-pending::before { background: linear-gradient(90deg, #ffb14d, #ffd36d); }
    .stat-users::before { background: linear-gradient(90deg, #8d84ff, #b2adff); }
    .panel-distribution::before { background: linear-gradient(90deg, #4da8ff, #7fd6ff); }
    .panel-roles::before { background: linear-gradient(90deg, #8d84ff, #b2adff); }
    .panel-activity::before { background: linear-gradient(90deg, #29d0c4, #7ce9d2); }
    .metric-num { font-size: 34px; font-weight: 800; margin-bottom: 8px; }
    .metric-label { font-size: 15px; }
    .metric-trend { margin-top: 8px; font-size: 13px; color: #bfe8ff; }
    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .panel h2 {
      margin: 0 0 14px;
      font-size: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .summary-box {
      min-height: 220px;
      border-radius: 16px;
      border: 1px solid rgba(114, 197, 255, 0.14);
      background: rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .summary-box .icon {
      font-size: 38px;
      margin-bottom: 12px;
      color: #8ecfff;
      font-weight: 800;
    }
    .summary-box .line { margin-top: 8px; color: #bfe8ff; }
    .activity-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(114, 197, 255, 0.1);
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      flex: none;
      font-weight: 700;
    }
    .activity-title { font-weight: 700; margin-bottom: 4px; }
    .activity-time { font-size: 12px; color: #abdfff; }
    .empty-state { padding: 36px 12px; text-align: center; color: #abdfff; }
    .loading { padding: 50px 12px; text-align: center; color: #abdfff; }
    @media (max-width: 980px) { .stats-grid, .charts { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 720px) { .stats-grid, .charts { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <div>
        <h1>系统统计</h1>
        <p>集中展示停送电审批平台的工单数量、审批效率、用户角色分布和最近活动，便于管理员快速了解系统运行情况。</p>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <el-button @click="fetchStats">刷新</el-button>
        <el-button type="primary" @click="goBack">返回</el-button>
      </div>
    </div>

    <div class="content">
      <div v-if="loading" class="loading">
        <div style="font-size: 24px; margin-bottom: 10px;">加载中</div>
        <div>正在加载统计数据...</div>
      </div>

      <template v-else>
        <div class="stats-grid">
          <div class="stat-card card stat-total">
            <div class="metric-num">{{ stats.totalApplications }}</div>
            <div class="metric-label">总申请数</div>
            <div class="metric-trend">今日新增 {{ stats.newApplications }}</div>
          </div>
          <div class="stat-card card stat-approved">
            <div class="metric-num">{{ stats.approvedApplications }}</div>
            <div class="metric-label">已审批</div>
            <div class="metric-trend">审批率 {{ stats.approvalRate }}%</div>
          </div>
          <div class="stat-card card stat-pending">
            <div class="metric-num">{{ stats.pendingApplications }}</div>
            <div class="metric-label">待审批</div>
            <div class="metric-trend">需要重点关注</div>
          </div>
          <div class="stat-card card stat-users">
            <div class="metric-num">{{ stats.totalUsers }}</div>
            <div class="metric-label">注册用户</div>
            <div class="metric-trend">当前系统账号总数</div>
          </div>
        </div>

        <div class="charts">
          <section class="panel card panel-distribution">
            <h2>申请状态分布</h2>
            <div class="summary-box">
              <div>
                <div class="icon">单</div>
                <div class="line">已审批：{{ stats.approvedApplications }}</div>
                <div class="line">待审批：{{ stats.pendingApplications }}</div>
                <div class="line">已驳回：{{ stats.rejectedApplications }}</div>
              </div>
            </div>
          </section>

          <section class="panel card panel-roles">
            <h2>用户角色分布</h2>
            <div class="summary-box">
              <div>
                <div class="icon">人</div>
                <div class="line">管理员：{{ stats.adminUsers }}</div>
                <div class="line">调度员：{{ stats.dispatcherUsers }}</div>
                <div class="line">电工：{{ stats.electricianUsers }}</div>
              </div>
            </div>
          </section>
        </div>

        <section class="panel card panel-activity">
          <h2>最近活动</h2>
          <div v-if="recentActivities.length === 0" class="empty-state">当前没有最近活动记录</div>
          <div v-else>
            <div v-for="activity in recentActivities" :key="activity.id" class="activity-item">
              <div class="activity-icon" :style="{ background: getActivityColor(activity.type) }">
                {{ getActivityMark(activity.type) }}
              </div>
              <div>
                <div class="activity-title">{{ activity.title }}</div>
                <div class="activity-time">{{ formatDateTime(activity.time) }}</div>
              </div>
            </div>
          </div>
        </section>
      </template>
    </div>
  </div>

  <script>
    if (!localStorage.getItem('user_realname') && !localStorage.getItem('user_username')) {
      window.appShell.handleUnauthorized();
    }
    if (localStorage.getItem('user_role') !== 'admin') {
      window.appShell.handleUnauthorized('只有管理员可以查看系统统计。', 400);
    }

    axios.defaults.withCredentials = true;
    const { createApp, ref, onMounted } = Vue;

    createApp({
      setup() {
        const loading = ref(true);
        const stats = ref({
          totalApplications: 0,
          approvedApplications: 0,
          pendingApplications: 0,
          rejectedApplications: 0,
          newApplications: 0,
          approvalRate: 0,
          totalUsers: 0,
          adminUsers: 0,
          dispatcherUsers: 0,
          electricianUsers: 0,
        });
        const recentActivities = ref([]);

        const formatDateTime = (timestamp) => {
          if (!timestamp) return '-';
          const date = new Date(timestamp);
          return Number.isNaN(date.getTime()) ? timestamp : date.toLocaleString('zh-CN');
        };

        const getActivityColor = (type) => ({
          apply: 'linear-gradient(135deg, #4da8ff, #2f7de0)',
          approve: 'linear-gradient(135deg, #29d0c4, #1cae9e)',
          reject: 'linear-gradient(135deg, #f56c6c, #d64c4c)',
          user: 'linear-gradient(135deg, #ffb14d, #d58d2f)',
        }[type] || 'linear-gradient(135deg, #4da8ff, #2f7de0)');

        const getActivityMark = (type) => ({
          apply: '申',
          approve: '审',
          reject: '驳',
          user: '人',
        }[type] || '记');

        const fetchStats = async () => {
          loading.value = true;
          try {
            const [applicationsRes, usersRes] = await Promise.all([
              axios.get('/api/list'),
              axios.get('/api/users'),
            ]);
            const applications = Array.isArray(applicationsRes.data) ? applicationsRes.data : [];
            const users = Array.isArray(usersRes.data) ? usersRes.data : [];

            stats.value.totalApplications = applications.length;
            stats.value.approvedApplications = applications.filter((item) => ['approved', 'verified', 'repairing', 'repair_completed', 'power_on_applied', 'completed'].includes(item.status)).length;
            stats.value.pendingApplications = applications.filter((item) => ['pending', 'power_on_applied'].includes(item.status)).length;
            stats.value.rejectedApplications = applications.filter((item) => ['rejected', 'power_on_rejected'].includes(item.status)).length;
            stats.value.newApplications = applications.filter((item) => {
              if (!item.created_at) return false;
              const created = new Date(item.created_at);
              const today = new Date();
              return created.toDateString() === today.toDateString();
            }).length;
            stats.value.approvalRate = stats.value.totalApplications
              ? Math.round((stats.value.approvedApplications / stats.value.totalApplications) * 100)
              : 0;
            stats.value.totalUsers = users.length;
            stats.value.adminUsers = users.filter((item) => item.role === 'admin').length;
            stats.value.dispatcherUsers = users.filter((item) => item.role === 'dispatcher').length;
            stats.value.electricianUsers = users.filter((item) => item.role === 'electrician').length;

            recentActivities.value = applications.slice(0, 8).map((item) => ({
              id: item.id,
              type: item.status === 'rejected' || item.status === 'power_on_rejected'
                ? 'reject'
                : item.status === 'pending'
                  ? 'apply'
                  : 'approve',
              title: `工单 #${item.id} - ${item.device_name || item.deviceId || '未知设备'} - ${item.reason || '无原因说明'}`,
              time: item.updated_at || item.created_at,
            }));
          } catch (error) {
            if (error?.response?.status === 401) {
              window.appShell.handleUnauthorized();
              return;
            }
            window.appShell.toast(error?.response?.data?.msg || '统计数据加载失败', 'error');
          } finally {
            loading.value = false;
          }
        };

        const goBack = () => window.appShell.goBackOrHome();

        onMounted(fetchStats);

        return {
          loading,
          stats,
          recentActivities,
          fetchStats,
          goBack,
          formatDateTime,
          getActivityColor,
          getActivityMark,
        };
      },
    }).use(ElementPlus).mount('#app');
  </script>
</body>
</html>
