<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>功能已停用</title>
  <link rel="stylesheet" href="/admin_theme.css">
  <script src="/app_shell.js"></script>
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .main { width: 560px; max-width: 100%; border-radius: 24px; padding: 34px 30px; text-align: center; }
    h1 { margin: 0 0 14px; font-size: 30px; color: #eef9ff; }
    .tip {
      margin: 0 0 18px; padding: 14px 16px; background: rgba(255, 207, 115, 0.12);
      border: 1px solid rgba(255, 207, 115, 0.28); border-radius: 14px;
      font-size: 14px; line-height: 1.8; color: #ffe1a1; text-align: left;
    }
    .result { margin-bottom: 22px; font-size: 14px; color: #d6e6f7; line-height: 1.8; text-align: left; }
    .actions { display: grid; gap: 12px; }
    button { width: 100%; border: none; border-radius: 12px; padding: 13px 16px; font-size: 16px; font-weight: 700; color: #fff; cursor: pointer; }
    .btn-primary { background: linear-gradient(135deg, #409eff, #2a6bc5); }
    .btn-back { background: rgba(255,255,255,0.08); border: 1px solid rgba(118,200,255,0.18); color: #d9f0ff; }
  </style>
</head>
<body>
  <div class="main wrap">
    <h1>功能已停用</h1>
    <div class="tip">
      当前系统不再负责现场停送电执行。平台保留审批流转、检修留痕、批次管理和设备监控，现场执行请按线下规程处理。
    </div>
    <div class="result">
      如需确认设备是否已经停电或送电，请前往“设备监控”页面查看实时状态，并结合现场执行结果核对。
    </div>
    <div class="actions">
      <button class="btn-primary" onclick="location.href='device_monitor.html'">前往设备监控</button>
      <button class="btn-back" onclick="window.appShell.goBackOrHome()">返回</button>
    </div>
  </div>
</body>
</html>
