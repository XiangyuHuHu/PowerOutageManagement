<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能停送电系统 - 用户注册</title>
  <script src="/vendor/vue.global.prod.js"></script>
  <script src="/vendor/axios.min.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      margin: 0; padding: 20px;
    }
    .register-box {
      background: rgba(16, 33, 47, 0.92); padding: 40px; border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4); width: 460px; color: #fff;
      border: 1px solid rgba(64, 158, 255, 0.3);
    }
    .register-box h2 {
      text-align: center; margin: 0 0 14px; background: linear-gradient(to right, #67c23a, #a0d9ff);
      -webkit-background-clip: text; color: transparent; font-size: 24px;
    }
    .sub { margin: 0 0 28px; text-align: center; color: #a0d9ff; line-height: 1.7; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: #a0d9ff; font-weight: 500; }
    .register-box input, .register-box select {
      width: 100%; padding: 14px; font-size: 16px; border-radius: 8px; border: none;
      background-color: rgba(255, 255, 255, 0.1); color: #fff; box-sizing: border-box;
    }
    .register-box input::placeholder { color: #c9d8e7; }
    .register-box select option { background-color: #1a3a5f; color: #fff; }
    .register-box button {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #67c23a, #4a8c2c); color: #fff;
      border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 15px;
    }
    .register-box button.secondary { background: linear-gradient(135deg, #409eff, #2a6bc5); }
    .error-message, .success-message { text-align: center; min-height: 24px; font-size: 14px; }
    .error-message { color: #ff9f9f; }
    .success-message { color: #92f5b5; }
  </style>
</head>
<body>
  <div id="app">
    <div class="register-box">
      <h2>注册新用户</h2>
      <div class="sub">填写基础信息后提交注册，管理员可在后台继续分配权限和配电室范围。</div>
      <div class="form-group">
        <label>用户名</label>
        <input v-model="form.username" placeholder="请输入用户名">
      </div>
      <div class="form-group">
        <label>真实姓名</label>
        <input v-model="form.realname" placeholder="请输入真实姓名">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input v-model="form.password" type="password" placeholder="请输入密码">
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <input v-model="form.confirmPassword" type="password" placeholder="请再次输入密码">
      </div>
      <div class="form-group">
        <label>角色</label>
        <select v-model="form.role">
          <option value="user">普通用户</option>
          <option value="electrician">电工</option>
          <option value="dispatcher">调度员</option>
        </select>
      </div>
      <button @click="register">提交注册</button>
      <button class="secondary" @click="goToLogin">返回登录</button>
      <div class="error-message">{{ error }}</div>
      <div class="success-message">{{ success }}</div>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue;
    axios.defaults.withCredentials = true;

    createApp({
      setup() {
        const form = ref({
          username: '',
          realname: '',
          password: '',
          confirmPassword: '',
          role: 'user',
        });
        const error = ref('');
        const success = ref('');

        const register = async () => {
          error.value = '';
          success.value = '';
          if (!form.value.username || !form.value.realname || !form.value.password) {
            error.value = '请填写完整的注册信息';
            return;
          }
          if (form.value.password !== form.value.confirmPassword) {
            error.value = '两次输入的密码不一致';
            return;
          }
          try {
            const payload = {
              username: form.value.username,
              realname: form.value.realname,
              password: form.value.password,
              role: form.value.role,
            };
            const res = await axios.post('/api/register', payload);
            success.value = res.data?.msg || '注册成功，请返回登录';
            form.value.password = '';
            form.value.confirmPassword = '';
          } catch (err) {
            error.value = err?.response?.data?.msg || '注册失败';
          }
        };

        const goToLogin = () => {
          window.location.href = 'login.html';
        };

        return { form, error, success, register, goToLogin };
      },
    }).mount('#app');
  </script>
</body>
</html>
