global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheus自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Flask应用监控
  - job_name: 'flask-app'
    static_configs:
      - targets: ['flask-app:5050']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # MySQL监控（如果需要）
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql:3306']
    scrape_interval: 10s
