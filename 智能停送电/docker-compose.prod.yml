name: power-control

services:
  mysql:
    image: mysql:8.0
    container_name: power_mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-power_control}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./shared/database.sql:/docker-entrypoint-initdb.d/database.sql:ro
    networks:
      - power_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  flask-backend:
    build: .
    container_name: power_backend
    ports:
      - "${APP_PORT:-5050}:5050"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-power_control}
      FLASK_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY}
      SESSION_TYPE: ${SESSION_TYPE:-filesystem}
      SESSION_REDIS_URL: ${SESSION_REDIS_URL:-}
      DEVICE_DATA_SOURCE: ${DEVICE_DATA_SOURCE:-opcua}
      MQTT_BROKER: ${MQTT_BROKER:-}
      MQTT_PORT: ${MQTT_PORT:-1883}
      OPCUA_ENDPOINT: ${OPCUA_ENDPOINT}
      OPCUA_NS: ${OPCUA_NS:-2}
      OPCUA_DEVICE_ID: ${OPCUA_DEVICE_ID:-opcua_device}
      OPCUA_POLL_INTERVAL: ${OPCUA_POLL_INTERVAL:-1}
      OPCUA_NODEIDS: ${OPCUA_NODEIDS:-}
      OPCUA_USERNAME: ${OPCUA_USERNAME:-}
      OPCUA_PASSWORD: ${OPCUA_PASSWORD:-}
      OPCUA_SECURITY_POLICY: ${OPCUA_SECURITY_POLICY:-None}
      OPCUA_SECURITY_MODE: ${OPCUA_SECURITY_MODE:-None}
      OPCUA_CERT: ${OPCUA_CERT:-}
      OPCUA_KEY: ${OPCUA_KEY:-}
      OPCUA_SERVER_CERT: ${OPCUA_SERVER_CERT:-}
      LANG: zh_CN.UTF-8
      LC_ALL: zh_CN.UTF-8
      PYTHONIOENCODING: utf-8
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - power_network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  power_network:
    driver: bridge
